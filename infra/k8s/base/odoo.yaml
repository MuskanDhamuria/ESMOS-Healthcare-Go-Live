apiVersion: v1
kind: Service
metadata:
  name: odoo-service
  namespace: odoo
spec:
  ports:
    - name: http
      port: 8069
      targetPort: 8069
  selector:
    app: odoo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo
  namespace: odoo
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: odoo
  template:
    metadata:
      labels:
        app: odoo
      annotations:
        demo-change: "v3"
    spec:
      containers:
        - name: odoo
          image: esmosacr.azurecr.io/odoo:bc8751afb9b263ec623a8ddc28791db689e0c2b5
          ports:
            - containerPort: 8069
          env:
            - name: HOST
              value: postgres
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: POSTGRES_USER
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: odoo-data
              mountPath: /var/lib/odoo
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: odoo-data
          persistentVolumeClaim:
            claimName: odoo-pvc
