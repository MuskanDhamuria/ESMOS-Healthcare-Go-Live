apiVersion: v1
kind: Service
metadata:
  name: odoo-service
  namespace: odoo
spec:
  ports:
    - name: http
      port: 8069
      targetPort: 8069
  selector:
    app: odoo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo
  namespace: odoo
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: odoo
  template:
    metadata:
      labels:
        app: odoo
      annotations:
        demo-change: "v2"
    spec:
      containers:
        - name: odoo
          image: esmosacr.azurecr.io/odoo:a80a8407c09a3cb4377606ddce240bc70b53eda1
          ports:
            - containerPort: 8069
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
