name: Build and Push to ACR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE_NAME: odoo
  DEPLOYMENT_NAME: odoo
  CONTAINER_NAME: odoo
  NAMESPACE: odoo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ACR
        run: |
          printf '%s' "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ secrets.REGISTRY_LOGIN_SERVER }}" \
            --username "${{ secrets.REGISTRY_USERNAME }}" \
            --password-stdin

# Build Odoo image 
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -f app/odoo/Dockerfile .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Show image tag
        run: |
          echo "Pushed image: ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Update Odoo manifest image tag (GitOps for ArgoCD)
        run: |
          IMAGE="${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          python - <<'PY'
          import os
          import pathlib
          import re
          
          image = os.environ["IMAGE"]
          path = pathlib.Path("infra/k8s/base/odoo.yaml")
          lines = path.read_text(encoding="utf-8").splitlines(True)

          start = None
          for index, line in enumerate(lines):
              if re.match(r"^kind:\\s*Deployment\\s*$", line):
                  start = index
                  break

          if start is None:
              raise SystemExit(f"Failed to update image in {path}; no Deployment found.")

          end = len(lines)
          for index in range(start + 1, len(lines)):
              if re.match(r"^---\\s*$", lines[index]):
                  end = index
                  break

          replaced = False
          in_containers = False

          for index in range(start, end):
              if re.match(r"^\\s*containers:\\s*$", lines[index]):
                  in_containers = True
                  continue

              if in_containers and re.match(r"^\\s*image:\\s*", lines[index]):
                  indent = re.match(r"^(\\s*)", lines[index]).group(1)
                  lines[index] = f"{indent}image: {image}\n"
                  replaced = True
                  break

          if not replaced:
              for index in range(start, end):
                  if re.match(r"^\\s*image:\\s*", lines[index]):
                      indent = re.match(r"^(\\s*)", lines[index]).group(1)
                      lines[index] = f"{indent}image: {image}\n"
                      replaced = True
                      break

          if not replaced:
              raise SystemExit(f"Failed to update image in {path}; no image line found in Deployment.")

          path.write_text("".join(lines), encoding="utf-8")
          print(f"Updated {path} image -> {image}")
          PY
        env:
          IMAGE: ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Commit and push manifest change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/base/odoo.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "chore(deploy): bump odoo image to ${{ github.sha }}"
          git push

      - name: Azure login (optional, for AKS deploy)
        uses: azure/login@v2
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Deploy new image to AKS
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}=${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n ${{ env.NAMESPACE }}

      - name: Verify rollout
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}
